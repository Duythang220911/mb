<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    >

    <meta name="theme-color" content="#333333">

    <!-- Android / PWA -->
    <link rel="manifest" href="./manifest.json">

    <!-- iPhone / iPad -->
    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="MB Priority"
    >

    <link
        rel="apple-touch-icon"
        href="./img/app-icon-512.png"
    >

    <!-- Boxicons -->
    <link
        href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
        rel="stylesheet"
    >

    <title>Chi tiết giao dịch</title>

    <link
        rel="stylesheet"
        href="./css/transaction-001.css"
    >
</head>

<body>

    <main class="bill-detail-page">

        <!-- Nền tối -->
        <button
            type="button"
            class="bill-overlay"
            id="billOverlay"
            aria-label="Đóng chi tiết giao dịch"
        ></button>


        <!-- Bottom sheet -->
        <section
            class="bill-sheet"
            id="billSheet"
            role="dialog"
            aria-modal="true"
            aria-labelledby="billTitle"
        >

            <!-- Thanh kéo -->
            <div
                class="bill-drag-area"
                id="billDragArea"
            >
                <span
                    class="bill-handle"
                    aria-hidden="true"
                ></span>
            </div>


            <div class="bill-sheet-content">

                <!-- Tiêu đề -->
                <h1
                    class="bill-title"
                    id="billTitle"
                >
                    Chi tiết giao dịch
                </h1>


                <!-- Số tiền -->
                <div class="bill-amount">

                    <span
                        class="bill-amount-icon"
                        aria-hidden="true"
                    >
                        <i class="bx bx-wallet"></i>
                    </span>

                    <strong>10,000,000 VND</strong>

                </div>


                <!-- Loại giao dịch -->
                <h2 class="bill-transfer-title">
                    Chuyển khoản đến
                </h2>


                <!-- Thông tin -->
                <section class="bill-information">

                    <div class="bill-row">

                        <span class="bill-label">
                            Tên tài khoản
                        </span>

                        <strong class="bill-value">
                            HOANG DUY THANG
                        </strong>

                    </div>


                    <div class="bill-row">

                        <span class="bill-label">
                            Số tài khoản
                        </span>

                        <strong class="bill-value">
                            787866686
                        </strong>

                    </div>


                    <div class="bill-row bill-content-row">

                        <span class="bill-label">
                            Nội dung
                        </span>

                        <strong class="bill-value">
                            NGUYEN VAN THUONG<br>
                            QAATXM0070 APPMB11<br>
                            NGUYEN VAN TH UONG<br>
                            thanh toan. TU: NGUYEN<br>
                            VAN THUONG
                        </strong>

                    </div>


                    <div class="bill-row">

                        <span class="bill-label">
                            Thời gian
                        </span>

                        <strong class="bill-value">
                            15/07/2026 23:35:27
                        </strong>

                    </div>


                    <div class="bill-row">

                        <span class="bill-label">
                            Mã giao dịch
                        </span>

                        <strong class="bill-value">
                            FT26197849221026
                        </strong>

                    </div>

                </section>

            </div>

        </section>

    </main>

    <script src="./js/transaction-001.js"></script>
</body>

</html>
